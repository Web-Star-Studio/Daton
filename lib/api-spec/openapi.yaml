    SuggestActionPlanDraftBody:
      type: object
      description: >-
        Input for the opt-in AI draft ("Sugerir plano"). The model reads the
        problem statement (and optional origin context) and returns a suggested
        5W2H plan and a 5-whys root-cause chain. Nothing is persisted; the core
        flow does not depend on this endpoint.
      properties:
        problem:
          type: string
          minLength: 1
          description: Free-text problem / nonconformity statement the draft reasons from.
        title:
          type: string
          nullable: true
          description: Optional action title, for extra context.
        sourceModule:
          $ref: "#/components/schemas/ActionPlanSourceModule"
        contextLabel:
          type: string
          nullable: true
          description: Optional human-readable origin (e.g. "KPI · Indicador X · Mai/2026").
      required:
        - problem

    SuggestActionPlanDraftResponse:
      type: object
      description: >-
        AI-drafted fields. The client pre-fills the editable form and the user
        reviews/edits before saving — never auto-applied. Field shapes mirror
        CreateActionPlanBody so the draft maps 1:1 onto the form.
      properties:
        plan5w2h:
          $ref: "#/components/schemas/ActionPlan5W2H"
        rootCause:
          type: string
          nullable: true
        rootCauseWhys:
          type: array
          items:
            type: string
          description: Ordered 5-whys chain (root-cause analysis), up to 5 entries.
      required:
        - plan5w2h
        - rootCauseWhys

