  /organizations/{orgId}/regulatory-documents:
    get:
      operationId: listRegulatoryDocuments
      tags: [regulatory-documents]
      summary: List regulatory documents (licenças, AVCB, alvarás) for an organization
      description: |
        Returns a paginated list. Defaults to page=1, pageSize=50 (max 200).
        Pass `all=true` to receive every record in a single page — used by the
        home widget and other places that need the full set to compute summaries.
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: query
          schema:
            type: integer
        - name: identifierType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: all
          in: query
          description: When true, bypasses pagination and returns all matching rows in a single response.
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated list of regulatory documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRegulatoryDocuments"
    post:
      operationId: createRegulatoryDocument
      tags: [regulatory-documents]
      summary: Create a regulatory document
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegulatoryDocumentBody"
      responses:
        "201":
          description: Regulatory document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegulatoryDocument"

  /organizations/{orgId}/regulatory-documents/import:
    post:
      operationId: importRegulatoryDocuments
      tags: [regulatory-documents]
      summary: Bulk-import regulatory documents from a spreadsheet (CSV/Excel)
      description: |
        Imports an array of regulatory documents. Each row is validated and
        inserted individually — valid rows are persisted while invalid rows
        are reported in the `errors` array with the row number from the
        spreadsheet (header = row 1, first data row = 2). When a row sets
        `renewalRequired=true`, the auto-renewal cycle is created as in POST.
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRegulatoryDocumentsBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRegulatoryDocumentsResponse"

