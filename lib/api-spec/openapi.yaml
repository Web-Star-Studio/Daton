openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Daton Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: organizations
    description: Organization management
  - name: units
    description: Unit management
  - name: legislations
    description: Legislation management
  - name: unit-legislations
    description: Unit-legislation compliance
  - name: employees
    description: Employee management (ISO 9001:2015)
  - name: competencies
    description: Employee competency tracking (ISO 9001:2015 §7.2)
  - name: trainings
    description: Employee training records (ISO 9001:2015 §7.2)
  - name: awareness
    description: Employee awareness records (ISO 9001:2015 §7.3)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user and organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /organizations/{orgId}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{orgId}/units:
    get:
      operationId: listUnits
      tags: [units]
      summary: List units for an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Unit"
    post:
      operationId: createUnit
      tags: [units]
      summary: Create a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnitBody"
      responses:
        "201":
          description: Unit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"

  /organizations/{orgId}/units/{unitId}:
    get:
      operationId: getUnit
      tags: [units]
      summary: Get unit details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unit details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
    patch:
      operationId: updateUnit
      tags: [units]
      summary: Update a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUnitBody"
      responses:
        "200":
          description: Updated unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unit"
    delete:
      operationId: deleteUnit
      tags: [units]
      summary: Delete a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations/{orgId}/legislations:
    get:
      operationId: listLegislations
      tags: [legislations]
      summary: List legislations for an organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            enum: [federal, estadual, municipal, internacional]
        - name: unitId
          in: query
          schema:
            type: integer
          description: Filter legislations by unit compliance tags
      responses:
        "200":
          description: List of legislations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Legislation"
    post:
      operationId: createLegislation
      tags: [legislations]
      summary: Create a legislation
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLegislationBody"
      responses:
        "201":
          description: Legislation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Legislation"

  /organizations/{orgId}/legislations/import:
    post:
      operationId: importLegislations
      tags: [legislations]
      summary: Import legislations from CSV
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportLegislationsBody"
      responses:
        "201":
          description: Legislations imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /organizations/{orgId}/legislations/{legId}:
    get:
      operationId: getLegislation
      tags: [legislations]
      summary: Get legislation details
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Legislation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegislationDetail"
    patch:
      operationId: updateLegislation
      tags: [legislations]
      summary: Update a legislation
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLegislationBody"
      responses:
        "200":
          description: Updated legislation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Legislation"
    delete:
      operationId: deleteLegislation
      tags: [legislations]
      summary: Delete a legislation
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /organizations/{orgId}/legislations/{legId}/units:
    get:
      operationId: listLegislationUnits
      tags: [unit-legislations]
      summary: List units assigned to a legislation with compliance status
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of unit-legislation assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnitLegislation"
    post:
      operationId: assignLegislationToUnit
      tags: [unit-legislations]
      summary: Assign a legislation to a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignLegislationBody"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitLegislation"

  /organizations/{orgId}/legislations/{legId}/units/{unitId}:
    patch:
      operationId: updateUnitLegislation
      tags: [unit-legislations]
      summary: Update compliance status for a unit-legislation
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUnitLegislationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitLegislation"
    delete:
      operationId: removeUnitLegislation
      tags: [unit-legislations]
      summary: Remove a unit-legislation assignment
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: legId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /organizations/{orgId}/units/{unitId}/legislations:
    get:
      operationId: listUnitLegislations
      tags: [unit-legislations]
      summary: List legislations assigned to a unit with compliance status
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of unit-legislation assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnitLegislationWithLegislation"

  /compliance-tag-vocabulary:
    get:
      operationId: getComplianceTagVocabulary
      tags: [questionnaire]
      summary: Get full compliance tag vocabulary
      description: Returns all unique tag strings from the questionnaire questions tags JSONB column, sorted alphabetically
      responses:
        "200":
          description: Sorted list of all compliance tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /organizations/{orgId}/questionnaire/themes:
    get:
      operationId: listQuestionnaireThemes
      tags: [questionnaire]
      summary: List questionnaire themes with questions
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of themes with questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionnaireTheme"

  /organizations/{orgId}/units/{unitId}/questionnaire/responses:
    get:
      operationId: getUnitQuestionnaireResponses
      tags: [questionnaire]
      summary: Get saved responses for a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Map of question code to answer
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      operationId: saveUnitQuestionnaireResponses
      tags: [questionnaire]
      summary: Save questionnaire responses for a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveQuestionnaireResponsesBody"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /organizations/{orgId}/units/{unitId}/questionnaire/submit:
    post:
      operationId: submitUnitQuestionnaire
      tags: [questionnaire]
      summary: Submit questionnaire and generate compliance tags
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tags generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitQuestionnaireResponse"

  /organizations/{orgId}/units/{unitId}/questionnaire/tags:
    get:
      operationId: getUnitComplianceTags
      tags: [questionnaire]
      summary: Get compliance tags for a unit
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: unitId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of compliance tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceTag"

  /organizations/{orgId}/employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: unitId
          in: query
          schema:
            type: integer
        - name: position
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEmployees"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create employee
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /organizations/{orgId}/employees/{empId}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee with competencies, trainings, awareness
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee detail with competencies, trainings, awareness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetail"
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update employee
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete employee
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Employee deleted

  /organizations/{orgId}/employees/{empId}/competencies:
    get:
      operationId: listCompetencies
      tags: [competencies]
      summary: List employee competencies
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of competencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeCompetency"
    post:
      operationId: createCompetency
      tags: [competencies]
      summary: Create competency
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetencyBody"
      responses:
        "201":
          description: Created competency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeCompetency"

  /organizations/{orgId}/employees/{empId}/competencies/{compId}:
    patch:
      operationId: updateCompetency
      tags: [competencies]
      summary: Update competency
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
        - name: compId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompetencyBody"
      responses:
        "200":
          description: Updated competency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeCompetency"
    delete:
      operationId: deleteCompetency
      tags: [competencies]
      summary: Delete competency
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
        - name: compId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Competency deleted

  /organizations/{orgId}/employees/{empId}/trainings:
    get:
      operationId: listTrainings
      tags: [trainings]
      summary: List employee trainings
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of trainings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeTraining"
    post:
      operationId: createTraining
      tags: [trainings]
      summary: Create training
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingBody"
      responses:
        "201":
          description: Created training
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeTraining"

  /organizations/{orgId}/employees/{empId}/trainings/{trainId}:
    patch:
      operationId: updateTraining
      tags: [trainings]
      summary: Update training
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
        - name: trainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainingBody"
      responses:
        "200":
          description: Updated training
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeTraining"
    delete:
      operationId: deleteTraining
      tags: [trainings]
      summary: Delete training
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
        - name: trainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Training deleted

  /organizations/{orgId}/employees/{empId}/awareness:
    get:
      operationId: listAwareness
      tags: [awareness]
      summary: List employee awareness records
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of awareness records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeAwareness"
    post:
      operationId: createAwareness
      tags: [awareness]
      summary: Create awareness record
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
        - name: empId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAwarenessBody"
      responses:
        "201":
          description: Created awareness record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeAwareness"

  /organizations/{orgId}/employees/{empId}/awareness/{awaId}:
    patch:
      operationId: updateAwareness
      tags: [awareness]
      summary: Update awareness record
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
