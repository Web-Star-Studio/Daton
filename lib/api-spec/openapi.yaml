components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterBody:
      type: object
      properties:
        razaoSocial:
          type: string
        nomeFantasia:
          type: string
        cnpj:
          type: string
        adminName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - razaoSocial
        - adminName
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        organizationId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - organizationId
        - createdAt

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        organization:
          $ref: "#/components/schemas/Organization"
      required:
        - user
        - organization

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    UpdateOrganizationBody:
      type: object
      properties:
        name:
          type: string

    Unit:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        name:
          type: string
        code:
          type: ["string", "null"]
        type:
          type: string
          enum: [sede, filial]
        cnpj:
          type: ["string", "null"]
        status:
          type: string
          enum: [ativa, inativa]
        cep:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        streetNumber:
          type: ["string", "null"]
        neighborhood:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - name
        - type
        - status
        - createdAt
        - updatedAt

    CreateUnitBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum: [sede, filial]
        cnpj:
          type: string
        status:
          type: string
          enum: [ativa, inativa]
        cep:
          type: string
        address:
          type: string
        streetNumber:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        phone:
          type: string
      required:
        - name
        - type

    UpdateUnitBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        type:
          type: string
          enum: [sede, filial]
        cnpj:
          type: string
        status:
          type: string
          enum: [ativa, inativa]
        cep:
          type: string
        address:
          type: string
        streetNumber:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        phone:
          type: string

    Legislation:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        title:
          type: string
        number:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        tipoNorma:
          type: ["string", "null"]
        emissor:
          type: ["string", "null"]
        level:
          type: string
        uf:
          type: ["string", "null"]
        municipality:
          type: ["string", "null"]
        macrotema:
          type: ["string", "null"]
        subtema:
          type: ["string", "null"]
        applicability:
          type: ["string", "null"]
        publicationDate:
          type: ["string", "null"]
          format: date
        sourceUrl:
          type: ["string", "null"]
        applicableArticles:
          type: ["string", "null"]
        reviewFrequencyDays:
          type: ["integer", "null"]
        observations:
          type: ["string", "null"]
        generalObservations:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        matchedTags:
          type: array
          items:
            type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - title
        - level
        - tags
        - createdAt
        - updatedAt

    LegislationDetail:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        title:
          type: string
        number:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
