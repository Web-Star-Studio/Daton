components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterBody:
      type: object
      properties:
        legalName:
          type: string
        tradeName:
          type: string
          nullable: true
        legalIdentifier:
          type: string
        adminFullName:
          type: string
        adminEmail:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - legalName
        - legalIdentifier
        - adminFullName
        - adminEmail
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        organizationId:
          type: integer
        role:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - organizationId
        - role
        - createdAt

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        organization:
          $ref: "#/components/schemas/Organization"
        modules:
          type: array
          items:
            $ref: "#/components/schemas/AppModule"
      required:
        - user
        - organization
        - modules

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tradeName:
          type: ["string", "null"]
        legalIdentifier:
          type: ["string", "null"]
        openingDate:
          type: ["string", "null"]
        taxRegime:
          type: ["string", "null"]
        primaryCnae:
          type: ["string", "null"]
        stateRegistration:
          type: ["string", "null"]
        municipalRegistration:
          type: ["string", "null"]
        statusOperacional:
          type: ["string", "null"]
        onboardingStatus:
          $ref: "#/components/schemas/OnboardingStatus"
        onboardingData:
          $ref: "#/components/schemas/OrganizationOnboardingData"
        onboardingCompletedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
        - updatedAt

    UpdateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        tradeName:
          type: ["string", "null"]
        legalIdentifier:
          type: ["string", "null"]
        openingDate:
          type: ["string", "null"]
        taxRegime:
          type: ["string", "null"]
        primaryCnae:
          type: ["string", "null"]
        stateRegistration:
          type: ["string", "null"]
        municipalRegistration:
          type: ["string", "null"]
        statusOperacional:
          type: ["string", "null"]

    OrganizationOnboardingAuthResponse:
      type: object
      properties:
        token:
          type: string
        organization:
          $ref: "#/components/schemas/Organization"
      required:
        - token
        - organization

    OnboardingStatus:
      type: string
      enum: [pending, completed, skipped]

    OrganizationSector:
      type: string
      enum:
        - manufacturing
        - agro
        - food_beverage
        - mining
        - oil_gas
        - energy
        - chemical
        - pulp_paper
        - steel
        - logistics
        - financial
        - telecom
        - public
        - pharma_cosmetics
        - automotive
        - technology
        - consumer_goods
        - utilities
        - healthcare
        - education
        - retail
        - construction
        - services
        - other

    OrganizationSize:
      type: string
      enum: [micro, small, medium, large, xlarge, enterprise]

    OrganizationGoal:
      type: string
      enum:
        - emissions_reduction
        - environmental_compliance
        - health_safety
        - energy_efficiency
        - water_management
        - waste_reduction
        - sustainability
        - quality
        - compliance
        - performance
        - innovation
        - cost_reduction

