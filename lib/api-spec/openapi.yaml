          description: True quando o valor foi entrado manualmente (override sobre o cálculo do corporativo).
        isComputed:
          type: boolean
          description: True quando o valor foi calculado on-read a partir dos filhos do corporativo (não é lançamento manual).
        childrenWithData:
          type: ["integer", "null"]
          description: Quando isComputed=true, quantos filhos tinham dado no mês.
        childrenTotal:
          type: ["integer", "null"]
          description: Quando isComputed=true, total de filhos do corporativo.
