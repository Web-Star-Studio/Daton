          type: string
        clause:
          type: string
        workloadHours:
          type: number
        validityMonths:
          type: integer
          nullable: true
        isMandatory:
          type: boolean
        status:
          type: string
        targetCompetencyName:
          type: string
        targetCompetencyType:
          type: string
        targetCompetencyLevel:
          type: integer
        defaultInstructor:
          type: string
        objective:
          type: string
        programContent:
          type: string
        evaluationMethod:
          type: string
      required:
        - title

