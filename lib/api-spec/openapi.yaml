components:
  schemas:
    TrainingCatalogItem:
      type: object
      description: "Item do catálogo de treinamentos (definição reutilizável)."
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        title:
          type: string
        category:
          type: string
          nullable: true
        modality:
          type: string
          nullable: true
        norm:
          type: string
          nullable: true
        clause:
          type: string
          nullable: true
        workloadHours:
          type: number
          nullable: true
        validityMonths:
          type: integer
          nullable: true
        isMandatory:
          type: boolean
        status:
          type: string
        targetCompetencyName:
          type: string
          nullable: true
        targetCompetencyType:
          type: string
          nullable: true
        targetCompetencyLevel:
          type: integer
          nullable: true
        defaultInstructor:
          type: string
          nullable: true
        objective:
          type: string
          nullable: true
        programContent:
          type: string
          nullable: true
        evaluationMethod:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - organizationId
        - title
        - isMandatory
        - status
        - createdAt
        - updatedAt

    CreateTrainingCatalogItemBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
