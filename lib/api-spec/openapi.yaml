          maximum: 20971520
          description: Bytes; max 20MB (matches the direct-upload limit at /storage/uploads/direct)
        contentType:
          type: string
          minLength: 1
          maxLength: 255
        objectPath:
          type: string
          minLength: 1
          pattern: "^/objects/uploads/"
          description: Object path returned by /storage/uploads/direct; must live under the canonical upload prefix
      required:
        - fileName
