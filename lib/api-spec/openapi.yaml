      properties:
        weakness:
          type: integer
          minimum: 2
          maximum: 16
          description: "Fraquezas — resultado ≥ este valor exige plano de ação."
        opportunity:
          type: integer
          minimum: 2
          maximum: 16
          description: "Oportunidades — resultado ≥ este valor exige plano de ação."
        threat:
          type: integer
          minimum: 2
          maximum: 16
          description: "Ameaças — resultado ≥ este valor exige plano de ação."
      required:
