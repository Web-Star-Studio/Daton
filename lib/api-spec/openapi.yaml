          description: Count keyed by ActionPlanStatus
        byPriority:
          type: object
          additionalProperties:
            type: integer
        bySourceModule:
          type: object
          additionalProperties:
            type: integer
        byActionType:
          type: object
          additionalProperties:
            type: integer
        overdue:
          type: integer
          description: status not completed/cancelled and dueDate < today
        dueSoon:
          type: integer
          description: due within the next 7 days
        completedThisMonth:
          type: integer
        effectivenessRatePct:
          type: ["number", "null"]
          description: effective / (effective + ineffective) × 100, null when none evaluated
        avgCompletionDays:
          type: ["number", "null"]
          description: mean days from createdAt to correctiveActionCompletedAt for completed plans
        gutAverage:
          type: ["number", "null"]
          description: mean G×U×T over plans that have GUT set
        odsDistribution:
          type: array
          items:
            type: object
            properties:
              ods:
                type: integer
              count:
                type: integer
            required: [ods, count]
        effectivenessEvolution:
          type: array
          description: last 6 months effectiveness rate
          items:
            type: object
            properties:
              year:
                type: integer
              month:
                type: integer
              ratePct:
                type: ["number", "null"]
            required: [year, month, ratePct]
      required:
        - total
        - byStatus
        - byPriority
        - bySourceModule
        - byActionType
        - overdue
        - dueSoon
        - completedThisMonth
        - effectivenessRatePct
        - avgCompletionDays
        - gutAverage
        - odsDistribution
        - effectivenessEvolution

